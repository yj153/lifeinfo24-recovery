<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>이용안내</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.8;color:#162033;background:#f6f8fc;margin:0;padding:32px}.box{max-width:860px;margin:auto;background:white;border:1px solid #e8edf5;border-radius:18px;padding:32px}h1{margin-top:0}</style></head><body><div class="box"><h1>이용안내</h1><p>본 페이지는 밀당PT 관련 상담 신청을 안내하는 정보 페이지입니다.</p><p>상담 내용, 수강 조건, 혜택은 신청자의 학년, 과목, 학습 상황 및 이벤트 기준에 따라 달라질 수 있습니다.</p><p>이벤트와 혜택은 신청 시점 및 수강 조건에 따라 변경될 수 있습니다.</p></div></body></html>
