    <h1>이용안내</h1>
    <p>본 페이지는 개인회생·개인파산 관련 상담 신청을 안내하는 정보 페이지입니다.</p>
    <p>상담 내용 및 진행 가능 여부는 신청자의 소득, 재산, 채무 상황에 따라 달라질 수 있습니다.</p>
    <p>상담신청 후 담당자가 순차적으로 연락드려 가능 여부를 안내드립니다.</p>
