<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>법무법인 서앤율 법률상담 신청</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR","Apple SD Gothic Neo",Arial,sans-serif;background:#f4f6fb;color:#111}
    .wrap{max-width:900px;margin:0 auto;min-height:100vh;padding:28px 16px 44px}
    .head{text-align:center;margin-bottom:18px}
    .badge{display:inline-block;background:#2f61d4;color:#fff;border-radius:999px;padding:7px 14px;font-size:14px;font-weight:900;margin-bottom:10px}
    h1{margin:0 0 8px;font-size:31px;letter-spacing:-.06em;line-height:1.24}
    .sub{margin:0;color:#45516a;font-weight:700;line-height:1.55}
    .form-card{background:#fff;border:2px solid #2f61d4;border-radius:18px;padding:22px;box-shadow:0 18px 42px rgba(47,97,212,.12)}
    iframe{display:block;width:100%;min-height:560px;border:0}
    .notice{margin:14px 0 0;font-size:12px;color:#777;text-align:center;line-height:1.55}
    .back{display:block;width:max-content;max-width:100%;margin:18px auto 0;color:#333;text-decoration:underline;text-underline-offset:3px;font-size:13px}
    @media(max-width:720px){.wrap{padding:20px 10px 34px}h1{font-size:24px}.form-card{padding:10px;border-radius:14px}iframe{min-height:660px}}
  
    body{font-size:18px!important}
    h1{font-size:34px!important}
    .sub{font-size:18px!important}
    .badge{font-size:16px!important}
    .notice,.back{font-size:14px!important}
    @media(max-width:720px){h1{font-size:27px!important}.sub{font-size:16px!important}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div class="badge">개인회생 · 개인파산 상담</div>
      <h1>법무법인 서앤율 법률상담 신청</h1>
      <p class="sub">아래 입력폼 작성 후 상담 신청을 완료해주세요.</p>
    </div>
    <section class="form-card">
      <iframe name="ifrm_icode" id="ifrCCAl" scrolling="no" frameborder="0" width="100%" src="https://www.albarich.com/intro/_frm/index.php?code=DJqg8LX0UX"></iframe>
    </section>
    <p class="notice">입력폼 제출 및 상담 안내는 해당 신청폼 기준에 따라 진행됩니다.</p>
    <a class="back" href="../">상담 안내 페이지로 돌아가기</a>
  </main>
  <script type="text/javascript" src="https://www.albarich.com/js/jquery-1.11.0.min.js"></script>
  <script type="text/javascript" src="https://www.albarich.com/js/iframeResizer.min.js"></script>
  <script type="text/javascript">
    if (window.jQuery && window.jQuery.fn && window.jQuery.fn.iFrameResize) {
      $("#ifrCCAl").iFrameResize({
        autoResize:true,bodyBackground:null,bodyMargin:null,bodyMarginV1:0,bodyPadding:null,
        checkOrigin:true,enablePublicMethods:false,heightCalculationMethod:"offset",interval:32,
        log:false,maxHeight:Infinity,maxWidth:Infinity,minHeight:0,minWidth:0,scrolling:false,
        sizeHeight:true,sizeWidth:false,tolerance:0,
        closedCallback:function(){},initCallback:function(){},messageCallback:function(){},
        resizedCallback:function(){},callback:function(messageData){return true;}
      });
    }
  </script>
</body>
</html>
